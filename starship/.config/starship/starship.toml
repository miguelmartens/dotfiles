format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$crystal\
$zig\
$package\
$azure\
$openstack\
$kubernetes\
$helm\
$opa\
$terraform\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'zed'

[directory]
style = 'bold fg:accent'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )]($style)'
pyenv_version_name = true
pyenv_prefix = ''
detect_files = ['requirements.txt', 'pyproject.toml', 'Pipfile', 'setup.py', '.python-version', 'tox.ini', 'setup.cfg']
detect_folders = ['.venv', 'venv', '__pycache__']

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[haskell]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[ruby]
style = 'blue'
symbol = ' '


[crystal]
style = 'white'
symbol = '🔮 '

[zig]
style = 'yellow'
symbol = '↯ '

[package]
symbol = '󰏗 '

[aws]
disabled = true
symbol = ' '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[azure]
disabled = false
symbol = '󰠅 '
style = 'blue'
format = '[$symbol($subscription)]($style) '

[openstack]
symbol = '☁ '
style = 'yellow'
format = '[$symbol$cloud( \($project\))]($style)'

[kubernetes]
disabled = false
symbol = '☸ '
style = 'blue'
format = '[$symbol$context( \($namespace\))]($style)'

[helm]
symbol = '⎈ '
style = 'white'
format = '[$symbol($version )]($style)'

[opa]
symbol = '🪖 '
style = 'blue'
format = '[$symbol($version )]($style)'

[terraform]
symbol = '💠 '
style = 'purple'
format = '[$symbol($version )]($style)'

[docker_context]
symbol = ' '
style = 'fg:teal'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[character]
success_symbol = '[❯](bold fg:accent) '
error_symbol = '[❯](bold fg:red) '

